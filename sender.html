<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 호출 및 회원가입 시스템</title>
    <link rel="stylesheet" href="sender-style.css">
</head>
<body>
    <div id="authContainer" class="auth-container">
        <div class="auth-box">
            <h2 id="authTitle">학생 회원가입</h2>
            <input type="text" id="studentId" placeholder="아이디를 입력하세요">
            <input type="text" id="studentName" placeholder="이름을 입력하세요">
            <button id="authBtn">가입하기</button>
        </div>
    </div>

    <div id="mainContainer" class="container hidden">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>선생님 목록</h3>
                <button id="logoutBtn">로그아웃</button>
            </div>
            <ul id="teacherList">
                <li class="teacher-item" data-name="홍길동">홍길동 선생님</li>
                <li class="teacher-item" data-name="이순신">이순신 선생님</li>
                <li class="teacher-item" data-name="김유신">김유신 선생님</li>
            </ul>
        </aside>

        <main class="main-content">
            <h2>선생님 호출하기</h2>
            <div class="status-box">
                <p>접속 학생: <strong id="currentStudent">로그인 필요</strong></p>
                <p>선택된 선생님: <strong id="selectedTeacher">없음</strong></p>
            </div>
            <textarea id="messageInput" placeholder="선생님께 전달할 메시지를 적으세요..."></textarea>
            <button id="callBtn" disabled>호출하기</button>
        </main>
    </div>

    <script src="sender-script.js"></script>
</body>
</html>
